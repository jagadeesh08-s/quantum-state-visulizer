services:
  - type: web
    name: quantum-visualizer-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # You will paste this in the Render dashboard
      - key: MEDICAL_DATASET_URL
        sync: false
      - key: IBM_QUANTUM_TOKEN
        sync: false
      - key: PORT
        value: "10000"
